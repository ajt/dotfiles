# ─── tmux.conf — fresh minimal config ────────────────────────────────
# Designed for tmux 3.x on macOS with Ghostty/iTerm2

# ─── General ─────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"  # true color support
set -s escape-time 0                              # no delay for escape key
set -g history-limit 50000
set -g focus-events on
set -g mouse on

# ─── Prefix ──────────────────────────────────────────────────────────
# C-a is more comfortable than C-b
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ─── Windows & Panes ────────────────────────────────────────────────
set -g base-index 1           # start windows at 1
setw -g pane-base-index 1     # start panes at 1
set -g renumber-windows on    # renumber when one closes
setw -g automatic-rename on

# split panes with | and - (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# new window keeps current path
bind c new-window -c "#{pane_current_path}"

# ─── Vim-style navigation ───────────────────────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize with vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# window navigation
bind -r C-h previous-window
bind -r C-l next-window
bind Tab last-window

# ─── Copy mode (vim style) ──────────────────────────────────────────
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ─── Reload config ──────────────────────────────────────────────────
bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# ─── Status bar ──────────────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=white"

set -g status-left-length 40
set -g status-left "#[fg=cyan,bold] #S #[fg=default]│ "

set -g status-right-length 80
set -g status-right "#[fg=colour244]#{?client_prefix,#[fg=cyan]⌨ ,}#[fg=colour244]%H:%M"

# window tabs
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=cyan,bold] #I:#W "
setw -g window-status-separator ""

# pane borders
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=cyan"

# ─── Activity ────────────────────────────────────────────────────────
set -g monitor-activity on
set -g visual-activity off

# ─── Local overrides ────────────────────────────────────────────────
if '[ -f ~/.tmux.conf.local ]' 'source ~/.tmux.conf.local'
