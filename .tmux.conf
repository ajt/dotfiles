# ~/.tmux.conf — standalone config (no framework)

# -- general -------------------------------------------------------------------

set -g default-terminal "screen-256color"
setw -g xterm-keys on
set -s escape-time 10
set -sg repeat-time 600
set -s focus-events on

set -g prefix C-b
bind C-b send-prefix

set -g history-limit 5000

# -- display -------------------------------------------------------------------

set -g base-index 1
setw -g pane-base-index 1
setw -g automatic-rename on
set -g automatic-rename-format '#{b:pane_current_path}'
set -g renumber-windows on
set -g set-titles on
set -g set-titles-string '#h ❐ #S ● #I #W'
set -g display-panes-time 800
set -g display-time 1000
set -g status-interval 10
setw -g monitor-activity on
set -g visual-activity off

# -- mouse & vi ----------------------------------------------------------------

set -g mouse on
set -g status-keys vi
setw -g mode-keys vi

# -- key bindings --------------------------------------------------------------

# reload config
bind r source-file ~/.tmux.conf \; display '~/.tmux.conf sourced'

# edit config
bind e new-window -n '~/.tmux.conf' "sh -c '\${EDITOR:-vim} ~/.tmux.conf && tmux source ~/.tmux.conf && tmux display \"~/.tmux.conf sourced\"'"

# session
bind C-c new-session
bind C-f command-prompt -p find-session 'switch-client -t %%'

# window navigation
bind Tab last-window
bind -r C-h previous-window
bind -r C-l next-window

# splits — keep current path
bind - split-window -v -c '#{pane_current_path}'
bind _ split-window -h -c '#{pane_current_path}'
bind | split-window -h -c '#{pane_current_path}'

# pane navigation (vim-style)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# pane resizing
bind -r H resize-pane -L 2
bind -r J resize-pane -D 2
bind -r K resize-pane -U 2
bind -r L resize-pane -R 2

# pane swapping
bind < swap-pane -U
bind > swap-pane -D

# enter copy mode
bind Enter copy-mode

# copy mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel

# copy to macOS clipboard
bind y run-shell -b 'tmux save-buffer - | pbcopy'

# clear screen + scrollback
bind -T root C-l send-keys C-l \; run-shell 'sleep 0.1' \; clear-history

# -- theme ---------------------------------------------------------------------

# pane borders
setw -g pane-border-style 'fg=#444444'
setw -g pane-active-border-style 'fg=#00afff'

# pane indicators
set -g display-panes-active-colour '#00afff'
set -g display-panes-colour '#00afff'

# messages
set -g message-style 'fg=#000000,bg=#ffff00,bold'
set -g message-command-style 'fg=#ffff00,bg=#000000,bold'

# mode (copy mode highlight)
setw -g mode-style 'fg=#000000,bg=#ffff00,bold'

# clock
setw -g clock-mode-colour '#00afff'
setw -g clock-mode-style 24

# -- status bar ----------------------------------------------------------------

set -g status-style 'fg=#8a8a8a,bg=#080808'

# left: session name (yellow) | uptime (pink)
set -g status-left-length 1000
set -g status-left '\
#[fg=#000000,bg=#ffff00,bold] ❐ #S \
#[fg=#ffff00,bg=#ff00af]\
#[fg=#e4e4e4,bg=#ff00af] #(~/bin/tmux-status.sh uptime) \
#[fg=#ff00af,bg=default] '

# right: prefix | battery | time | date | user (red) | host (white)
# battery variables are set by tmux-status.sh via #() trigger
set -g status-right-length 1000
set -g status-right '\
#[fg=#080808,bg=default]\
#[fg=#8a8a8a,bg=#080808]#{?client_prefix,⌨  ,}\
#(~/bin/tmux-status.sh battery > /dev/null)\
#{@battery_status} #{@battery_bar}#[fg=#8a8a8a] #{@battery_percentage} \
| %R \
| %d %b \
#[fg=#d70000,bg=#080808]\
#[fg=#e4e4e4,bg=#d70000] #(whoami) \
#[fg=#e4e4e4,bg=#d70000]\
#[fg=#000000,bg=#e4e4e4,bold] #H '

# window status
setw -g window-status-format ' #I #W '
setw -g window-status-style 'fg=#8a8a8a,bg=#080808'
setw -g window-status-activity-style 'fg=default,bg=default,underscore'
setw -g window-status-bell-style 'fg=#ffff00,bg=default,blink,bold'
setw -g window-status-last-style 'fg=#00afff,bg=default'
setw -g window-status-separator ''

# window current (powerline arrows)
setw -g window-status-current-format '\
#[fg=#080808,bg=#00afff]\
#[fg=#000000,bg=#00afff,bold] #I #W \
#[fg=#00afff,bg=#080808]'
setw -g window-status-current-style 'fg=#000000,bg=#00afff,bold'
